# Optional: "New" → "Blueprint" on Render and point at this repo, or copy build/start into your existing Web Service.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: romantic-site
    runtime: python
    plan: free
    buildCommand: pip install "Django==6.0.3" "whitenoise==6.12.0" "gunicorn==23.0.0" && python manage.py collectstatic --no-input && python manage.py migrate --noinput
    startCommand: gunicorn meet_site.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
