{% load static %}

<!DOCTYPE html>
<html>

<body>

<audio id="bgMusic" autoplay loop>

<source src="{% static 'music/Khat.mp3' %}" type="audio/mpeg">

</audio>


<script>

/*
Allow parent page to control playback
*/

window.addEventListener("message", function(event){

const music = document.getElementById("bgMusic");

if(event.data === "STOP_MUSIC"){

music.pause();

}

});

</script>

</body>

</html>
