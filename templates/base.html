<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>{% block title %}Page{% endblock %}</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
rel="stylesheet">


<style>

/* GLOBAL RESET */

html, body {

margin:0;
padding:0;

height:100%;

font-family:'Poppins', sans-serif;

background:#0d1117;

color:#e6edf3;

}


/* HERO SECTION */

.hero-section {

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

background:linear-gradient(
120deg,
#0d1117,
#161b22,
#0d1117
);

animation:fadeUp 1.2s ease;

}


/* HERO TITLE */

.hero-title {

font-size:64px;

color:#ff4d6d;

margin-bottom:20px;

}


/* HERO TEXT */

.hero-text {

font-size:22px;

max-width:700px;

line-height:1.8;

opacity:.9;

}


/* BUTTON */

.cta-button {

margin-top:30px;

padding:14px 40px;

border-radius:40px;

border:1px solid #ff4d6d;

color:#ff4d6d;

text-decoration:none;

background:transparent;

cursor:pointer;

transition:.3s ease;

display:inline-block;

}


.cta-button:hover {

background:#ff4d6d;

color:white;

box-shadow:0 0 20px #ff4d6d;

transform:translateY(-2px);

}


/* ENTRY ANIMATION */

@keyframes fadeUp {

from {

opacity:0;
transform:translateY(40px);

}

to {

opacity:1;
transform:translateY(0);

}

}

</style>


{% block extra_head %}{% endblock %}

</head>


<body class="{% block body_class %}{% endblock %}">

{% block site_header %}{% endblock %}

{% block content %}
{% endblock %}

{% block site_footer %}{% endblock %}

{% block extra_js %}
{% endblock %}

</body>

</html>
